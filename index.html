<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeStep | Fall Detection Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Pulse animation for when a fall is detected */
      .pulse-red {
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7);
        }
        70% {
          transform: scale(1.05);
          box-shadow: 0 0 0 20px rgba(220, 38, 38, 0);
        }
        100% {
          transform: scale(1);
          box-shadow: 0 0 0 0 rgba(220, 38, 38, 0);
        }
      }
    </style>
  </head>
  <body class="bg-slate-900 text-white font-sans min-h-screen flex flex-col">
    <header
      class="p-6 border-b border-slate-800 flex justify-between items-center"
    >
      <h1 class="text-2xl font-bold tracking-tight">
        SAFESTEP <span class="text-blue-500">AI</span>
      </h1>
      <div
        id="connection-status"
        class="flex items-center gap-2 text-sm text-green-400"
      >
        <span class="w-2 h-2 bg-green-400 rounded-full"></span> Sensors Active
      </div>
    </header>

    <main
      class="flex-1 flex flex-col items-center justify-center p-6 text-center"
    >
      <div
        id="status-orb"
        class="w-64 h-64 rounded-full bg-slate-800 border-8 border-slate-700 flex flex-col items-center justify-center mb-8 transition-all duration-500"
      >
        <span id="status-icon" class="text-5xl mb-2">🛡️</span>
        <h2
          id="status-text"
          class="text-xl font-bold uppercase tracking-widest"
        >
          System Armed
        </h2>
        <p id="sub-status" class="text-slate-400 text-sm mt-1">
          Monitoring Motion...
        </p>
      </div>

      <div class="grid grid-cols-2 gap-4 mb-10 w-full max-w-xs">
        <div class="bg-slate-800 p-3 rounded-xl border border-slate-700">
          <p class="text-xs text-slate-500 uppercase">Accel</p>
          <p id="accel-val" class="text-lg font-mono font-bold">0.00g</p>
        </div>
        <div class="bg-slate-800 p-3 rounded-xl border border-slate-700">
          <p class="text-xs text-slate-500 uppercase">Gyro</p>
          <p id="gyro-val" class="text-lg font-mono font-bold">0.00°</p>
        </div>
      </div>

      <button
        id="cancel-btn"
        onclick="cancelAlert()"
        class="hidden w-full max-w-md bg-white text-slate-900 py-6 rounded-3xl text-3xl font-black uppercase shadow-2xl active:scale-95 transition-transform"
      >
        I AM OKAY
      </button>

      <p id="instruction-text" class="mt-4 text-slate-500 italic">
        Device should be kept in a pocket or pouch.
      </p>
    </main>

    <footer class="p-6 bg-slate-800 rounded-t-3xl">
      <h3 class="text-sm font-bold text-slate-400 uppercase mb-3">
        Emergency Contact
      </h3>
      <div class="flex items-center justify-between">
        <div>
          <p class="font-bold text-lg">John Doe (Guardian)</p>
          <p class="text-sm text-slate-400">+1 (555) 012-3456</p>
        </div>
        <button class="p-3 bg-slate-700 rounded-full">⚙️</button>
      </div>
    </footer>

    <script src="FallDetector.js"></script>
    <script src="app.js"></script>
  </body>
</html>
